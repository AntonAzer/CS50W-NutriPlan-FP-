{% extends "nutriplan/layout.html" %}
{% load crispy_forms_tags %}
{% block title %}{{ action }} Recipe — NutriPlan{% endblock %}

{% block content %}
<div class="row justify-content-center">
  <div class="col-lg-8">
    <div class="card border-0 shadow-sm">
      <div class="card-header bg-success text-white fw-bold">
        <i class="bi bi-pencil-square me-1"></i>{{ action }} Recipe
      </div>
      <div class="card-body p-4">
        {% crispy form %}
      </div>
    </div>
  </div>
</div>
{% endblock %}
