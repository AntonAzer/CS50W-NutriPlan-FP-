{% extends "nutriplan/layout.html" %}
{% load crispy_forms_tags %}
{% block title %}Profile — NutriPlan{% endblock %}

{% block content %}
<div class="row justify-content-center">
  <div class="col-md-6">
    <div class="card border-0 shadow-sm">
      <div class="card-header bg-success text-white fw-bold">
        <i class="bi bi-person-circle me-1"></i>{{ user.username }}'s Profile
      </div>
      <div class="card-body p-4">
        <p class="text-muted small">Joined: {{ user.date_joined|date:"M j, Y" }}</p>
        <hr>
        <h6 class="fw-bold">Daily Calorie Goal</h6>
        {% crispy form %}
      </div>
    </div>
  </div>
</div>
{% endblock %}
