{% extends "nutriplan/layout.html" %}
{% block title %}Delete Recipe — NutriPlan{% endblock %}

{% block content %}
<div class="row justify-content-center">
  <div class="col-md-6 text-center">
    <div class="card border-danger shadow-sm">
      <div class="card-body py-5">
        <i class="bi bi-exclamation-triangle-fill text-danger fs-1 mb-3 d-block"></i>
        <h4 class="fw-bold">Delete "{{ recipe.title }}"?</h4>
        <p class="text-muted">This will also remove it from all meal plan entries. This action cannot be undone.</p>
        <form method="post" class="d-inline">
          {% csrf_token %}
          <button type="submit" class="btn btn-danger me-2">Yes, delete it</button>
          <a href="{% url 'recipe_detail' recipe.pk %}" class="btn btn-outline-secondary">Cancel</a>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
